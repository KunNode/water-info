services:
  # ─── PostgreSQL ───
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-docker.m.daocloud.io/library/}
    container_name: water-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: water_info
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${PG_PASSWORD:-123456}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "export PATH=/usr/lib/postgresql16/bin:/usr/libexec/postgresql16:$$PATH && pg_isready -U root -d water_info"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Redis ───
  redis:
    image: ${DOCKER_REGISTRY_PREFIX:-docker.m.daocloud.io/library/}redis:7-alpine
    container_name: water-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-123456} --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-123456}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Spring Boot Backend ───
  platform:
    build:
      context: ./water-info-platform
      dockerfile: Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-docker.m.daocloud.io/library/}
    container_name: water-platform
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/water_info
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${PG_PASSWORD:-123456}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_DATA_REDIS_PASSWORD: ${REDIS_PASSWORD:-123456}
      AI_SERVICE_URL: http://ai:8100
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
      JWT_SECRET: ${JWT_SECRET:-62CONvJaO3ylVpho8+IKFAw2gdkvFUX37s8pTnKDP5UL/qTW7hE+iKd1Eqdrc7LtsgqoUWWm8Hq57W9kS1p0zw==}
    ports:
      - "8080:8080"
    volumes:
      - platform-logs:/app/logs

  # ─── AI Service (轻量版) ───
  ai:
    build:
      context: ./water-info-ai
      dockerfile: Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-docker.m.daocloud.io/library/}
    container_name: water-ai
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      platform:
        condition: service_started
    environment:
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: water_info
      PG_USER: root
      PG_PASSWORD: ${PG_PASSWORD:-123456}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.deepseek.com/v1}
      OPENAI_MODEL: ${OPENAI_MODEL:-deepseek-chat}
      WEATHER_API_KEY: ${WEATHER_API_KEY:-}
      WATER_PLATFORM_BASE_URL: http://platform:8080
      WATER_PLATFORM_USERNAME: admin
      WATER_PLATFORM_PASSWORD: ${ADMIN_PASSWORD:-Admin@123456}
      AI_SERVICE_HOST: "0.0.0.0"
      AI_SERVICE_PORT: "8100"
    ports:
      - "8100:8100"

  # ─── Frontend Admin ───
  admin:
    build:
      context: ./water-info-admin
      dockerfile: Dockerfile
      args:
        DOCKER_REGISTRY_PREFIX: ${DOCKER_REGISTRY_PREFIX:-docker.m.daocloud.io/library/}
    container_name: water-admin
    restart: unless-stopped
    depends_on:
      - platform
    ports:
      - "5173:80"

  # ─── Nginx Reverse Proxy ───
  nginx:
    image: ${DOCKER_REGISTRY_PREFIX:-docker.m.daocloud.io/library/}nginx:alpine
    container_name: water-nginx
    restart: unless-stopped
    depends_on:
      - platform
      - ai
      - admin
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  pgdata:
  redisdata:
  platform-logs:
