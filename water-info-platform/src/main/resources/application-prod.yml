# Production Profile
spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:water_info}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    hikari:
      minimum-idle: 10
      maximum-pool-size: 50

jwt:
  secret: ${JWT_SECRET:change-this-in-production-must-be-at-least-256-bits}

logging:
  level:
    root: WARN
    com.waterinfo.platform: INFO

water-info:
  risk-scan:
    lightweight:
      enabled: ${RISK_SCAN_LIGHTWEIGHT_ENABLED:true}
      interval-ms: ${RISK_SCAN_LIGHTWEIGHT_INTERVAL_MS:120000}
    ai:
      base-url: ${AI_SERVICE_URL:http://water-info-ai:8100}
      service-token: ${AI_SERVICE_TOKEN:}
