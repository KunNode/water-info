# Test configuration
spring:
  datasource:
    driver-class-name: org.testcontainers.jdbc.ContainerDatabaseDriver
    url: jdbc:tc:postgresql:15:///water_info_test?TC_TMPFS=/testtmpfs:rw
  
  flyway:
    enabled: true
    locations: classpath:db/migration

  jpa:
    hibernate:
      ddl-auto: none

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

jwt:
  secret: test-secret-key-for-unit-tests-must-be-at-least-256-bits
  expiration: 86400000
  refresh-expiration: 604800000
  header: Authorization
  prefix: "Bearer "

app:
  admin:
    username: admin
    password: TestAdmin123
    real-name: Test Administrator

logging:
  level:
    root: WARN
    com.waterinfo.platform: DEBUG
