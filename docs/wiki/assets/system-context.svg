<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">智慧水利防汛应急管理系统上下文图</title>
  <desc id="desc">展示管理端、业务平台、AI 服务、数据库、Redis、Nginx 和外部 LLM 的系统关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 28px sans-serif;fill:#0f172a}.sub{font:15px sans-serif;fill:#475569}
      .box{fill:#fff;stroke:#2563eb;stroke-width:2.5;rx:10}.store{fill:#ecfeff;stroke:#0891b2;stroke-width:2.5;rx:10}
      .edge{stroke:#2563eb;stroke-width:2.5;fill:none;marker-end:url(#arrow)}.dash{stroke-dasharray:8 7}
      .h{font:700 19px sans-serif;fill:#0f172a}.t{font:14px sans-serif;fill:#334155}.small{font:12px sans-serif;fill:#64748b}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <text x="60" y="58" class="title">智慧水利防汛应急管理系统</text>
  <text x="60" y="86" class="sub">三服务架构：Vue 管理端 + Spring Boot 业务平台 + FastAPI/LangGraph AI 服务</text>

  <rect class="box" x="70" y="165" width="190" height="105"/>
  <text x="95" y="202" class="h">管理端用户</text>
  <text x="95" y="230" class="t">浏览器 / 指挥大屏</text>
  <text x="95" y="252" class="small">登录、监测、AI 指挥</text>

  <rect class="box" x="345" y="150" width="200" height="135"/>
  <text x="378" y="188" class="h">Nginx 统一入口</text>
  <text x="378" y="218" class="t">静态资源 / API</text>
  <text x="378" y="240" class="t">SSE / WebSocket</text>
  <text x="378" y="262" class="small">限流与安全头</text>

  <rect class="box" x="635" y="105" width="240" height="150"/>
  <text x="672" y="145" class="h">业务平台</text>
  <text x="672" y="174" class="t">Spring Boot / Java</text>
  <text x="672" y="196" class="t">认证、RBAC、告警、资源</text>
  <text x="672" y="218" class="small">统一 REST API 与 AI 代理</text>

  <rect class="box" x="635" y="335" width="240" height="150"/>
  <text x="670" y="375" class="h">AI 服务</text>
  <text x="670" y="404" class="t">FastAPI / LangGraph</text>
  <text x="670" y="426" class="t">RAG、记忆、风险研判</text>
  <text x="670" y="448" class="small">多 Agent 应急预案生成</text>

  <rect class="store" x="965" y="130" width="175" height="110"/>
  <text x="1002" y="170" class="h">PostgreSQL</text>
  <text x="1000" y="199" class="t">业务数据</text>
  <text x="1000" y="221" class="small">知识库 / 记忆</text>

  <rect class="store" x="965" y="290" width="175" height="95"/>
  <text x="1018" y="328" class="h">Redis</text>
  <text x="1000" y="357" class="t">缓存 / 会话</text>

  <rect class="box" x="965" y="445" width="175" height="100"/>
  <text x="1002" y="484" class="h">外部 LLM</text>
  <text x="992" y="513" class="t">OpenAI-compatible</text>

  <path class="edge" d="M260 218H345"/>
  <path class="edge" d="M545 205C585 185 600 180 635 180"/>
  <path class="edge" d="M545 240C595 300 600 385 635 410"/>
  <path class="edge" d="M875 170H965"/>
  <path class="edge" d="M875 215C920 230 930 315 965 335"/>
  <path class="edge dash" d="M875 410C925 380 925 205 965 185"/>
  <path class="edge" d="M875 440C920 460 930 485 965 495"/>
  <path class="edge dash" d="M640 250C540 335 385 340 255 270"/>

  <text x="60" y="610" class="small">约定：AI 可直接读取 PostgreSQL 降低研判延迟；涉及业务一致性的写操作通过业务平台完成。</text>
</svg>

