<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">AI 服务能力视图</title>
  <desc id="desc">展示 FastAPI、LangGraph、Agent、RAG、记忆、数据库和平台客户端之间的关系。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse"><path d="M0 0L10 5L0 10z" fill="#0f766e"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 28px sans-serif;fill:#0f172a}.sub{font:15px sans-serif;fill:#475569}
      .box{fill:#fff;stroke:#0f766e;stroke-width:2.5;rx:10}.lane{fill:#ecfdf5;stroke:#10b981;stroke-width:2;rx:12}
      .store{fill:#eef2ff;stroke:#4f46e5;stroke-width:2.5;rx:10}.edge{stroke:#0f766e;stroke-width:2.4;fill:none;marker-end:url(#arrow)}
      .h{font:700 18px sans-serif;fill:#0f172a}.t{font:14px sans-serif;fill:#334155}.small{font:12px sans-serif;fill:#64748b}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/>
  <text x="60" y="58" class="title">water-info-ai 能力视图</text>
  <text x="60" y="86" class="sub">FastAPI 暴露接口，LangGraph 编排多 Agent，工具层连接数据、知识库、平台 API 与 LLM。</text>

  <rect class="box" x="65" y="150" width="180" height="100"/>
  <text x="105" y="188" class="h">调用入口</text>
  <text x="92" y="218" class="t">REST / SSE</text>

  <rect class="box" x="315" y="135" width="210" height="130"/>
  <text x="365" y="174" class="h">FastAPI</text>
  <text x="350" y="204" class="t">查询 / 计划 / 知识库</text>
  <text x="350" y="226" class="t">会话 / 记忆 / 健康检查</text>

  <rect class="lane" x="590" y="90" width="300" height="270"/>
  <text x="675" y="130" class="h">LangGraph 编排</text>
  <rect class="box" x="625" y="158" width="230" height="52"/><text x="682" y="192" class="t">Supervisor 路由</text>
  <rect class="box" x="625" y="224" width="230" height="52"/><text x="661" y="258" class="t">Data / Risk / Plan</text>
  <rect class="box" x="625" y="290" width="230" height="52"/><text x="644" y="324" class="t">Resource / Notify / Final</text>

  <rect class="lane" x="590" y="405" width="300" height="150"/>
  <text x="688" y="445" class="h">工具层</text>
  <text x="642" y="482" class="t">data_tools / risk_tools</text>
  <text x="642" y="506" class="t">knowledge_tools / plan_tools</text>
  <text x="642" y="530" class="t">resource_tools / weather_tools</text>

  <rect class="store" x="970" y="105" width="170" height="85"/><text x="1010" y="142" class="h">PostgreSQL</text><text x="1006" y="168" class="t">直读数据</text>
  <rect class="store" x="970" y="230" width="170" height="85"/><text x="1030" y="267" class="h">Redis</text><text x="1003" y="293" class="t">缓存 / 会话</text>
  <rect class="store" x="970" y="355" width="170" height="85"/><text x="1018" y="392" class="h">LLM API</text><text x="1002" y="418" class="t">推理与生成</text>
  <rect class="store" x="970" y="480" width="170" height="85"/><text x="1006" y="517" class="h">业务平台</text><text x="1004" y="543" class="t">一致性写入</text>

  <path class="edge" d="M245 200H315"/>
  <path class="edge" d="M525 200H590"/>
  <path class="edge" d="M740 360V405"/>
  <path class="edge" d="M890 480H970"/>
  <path class="edge" d="M890 480C930 440 930 155 970 148"/>
  <path class="edge" d="M890 500C940 485 930 272 970 272"/>
  <path class="edge" d="M890 520C940 515 930 400 970 398"/>
</svg>

