<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">RAG 知识库流程</title>
  <desc id="desc">文档上传解析切块嵌入入库，查询时向量召回、关键词召回、RRF 融合并提供证据给 Agent。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2563eb"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 28px sans-serif;fill:#0f172a}.box{fill:#fff;stroke:#2563eb;stroke-width:2.3;rx:10}.store{fill:#ecfeff;stroke:#0891b2;stroke-width:2.5;rx:10}
      .edge{stroke:#2563eb;stroke-width:2.3;fill:none;marker-end:url(#arrow)}.h{font:700 17px sans-serif;fill:#0f172a}.t{font:13px sans-serif;fill:#475569}.lane{font:700 16px sans-serif;fill:#64748b}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/><text x="60" y="58" class="title">RAG 知识库流程</text>
  <text x="70" y="135" class="lane">文档入库链路</text>
  <rect class="box" x="70" y="170" width="135" height="72"/><text x="102" y="200" class="h">文档上传</text><text x="95" y="224" class="t">MD / TXT / PDF</text>
  <rect class="box" x="250" y="170" width="135" height="72"/><text x="300" y="200" class="h">解析</text><text x="281" y="224" class="t">Loader</text>
  <rect class="box" x="430" y="170" width="135" height="72"/><text x="480" y="200" class="h">切块</text><text x="467" y="224" class="t">Splitter</text>
  <rect class="box" x="610" y="170" width="135" height="72"/><text x="660" y="200" class="h">嵌入</text><text x="645" y="224" class="t">Embedding</text>
  <rect class="store" x="800" y="168" width="155" height="76"/><text x="827" y="200" class="h">PostgreSQL</text><text x="838" y="224" class="t">Chunks / Vectors</text>
  <path class="edge" d="M205 206H250"/><path class="edge" d="M385 206H430"/><path class="edge" d="M565 206H610"/><path class="edge" d="M745 206H800"/>

  <text x="70" y="365" class="lane">查询召回链路</text>
  <rect class="box" x="70" y="400" width="135" height="72"/><text x="103" y="430" class="h">用户问题</text><text x="93" y="454" class="t">Query</text>
  <rect class="box" x="250" y="355" width="150" height="72"/><text x="295" y="385" class="h">向量召回</text><text x="284" y="409" class="t">Similarity</text>
  <rect class="box" x="250" y="455" width="150" height="72"/><text x="295" y="485" class="h">关键词召回</text><text x="301" y="509" class="t">BM25 / jieba</text>
  <rect class="box" x="470" y="405" width="145" height="72"/><text x="514" y="435" class="h">RRF 融合</text><text x="507" y="459" class="t">Rank merge</text>
  <rect class="box" x="685" y="405" width="145" height="72"/><text x="728" y="435" class="h">证据引用</text><text x="718" y="459" class="t">Evidence</text>
  <rect class="box" x="900" y="405" width="150" height="72"/><text x="942" y="435" class="h">Agent 推理</text><text x="931" y="459" class="t">Risk / Plan / Final</text>
  <path class="edge" d="M205 436C225 420 225 392 250 392"/><path class="edge" d="M205 436C225 455 225 492 250 492"/><path class="edge" d="M400 392C430 405 440 428 470 436"/><path class="edge" d="M400 492C430 475 440 452 470 442"/><path class="edge" d="M615 441H685"/><path class="edge" d="M830 441H900"/><path class="edge" d="M878 244C860 315 755 355 400 392"/>
</svg>

