<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">读写边界</title>
  <desc id="desc">展示客户端、业务平台、AI 服务和数据组件之间的读写责任边界。</desc>
  <defs>
    <marker id="blueArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2563eb"/></marker>
    <marker id="amberArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#d97706"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 28px sans-serif;fill:#0f172a}.zone{fill:#fff;stroke:#94a3b8;stroke-width:2;rx:14}
      .box{fill:#f8fafc;stroke:#2563eb;stroke-width:2.2;rx:9}.ai{stroke:#0f766e}.store{fill:#ecfeff;stroke:#0891b2;stroke-width:2.3;rx:10}
      .read{stroke:#2563eb;stroke-width:2.4;fill:none;marker-end:url(#blueArrow)}.write{stroke:#d97706;stroke-width:2.7;fill:none;marker-end:url(#amberArrow)}
      .h{font:700 18px sans-serif;fill:#0f172a}.t{font:14px sans-serif;fill:#334155}.label{font:700 14px sans-serif;fill:#64748b}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/><text x="60" y="58" class="title">读写边界</text>
  <rect class="zone" x="55" y="120" width="230" height="360"/><text x="82" y="155" class="label">客户端</text>
  <rect class="box" x="90" y="215" width="160" height="85"/><text x="126" y="250" class="h">Vue 管理端</text><text x="122" y="278" class="t">页面 / 交互</text>

  <rect class="zone" x="360" y="105" width="270" height="390"/><text x="390" y="140" class="label">Java 业务平台</text>
  <rect class="box" x="405" y="175" width="180" height="65"/><text x="455" y="214" class="h">认证 / RBAC</text>
  <rect class="box" x="405" y="270" width="180" height="65"/><text x="458" y="309" class="h">业务服务</text>
  <rect class="box" x="405" y="365" width="180" height="65"/><text x="463" y="404" class="h">AI 代理</text>

  <rect class="zone" x="705" y="105" width="270" height="390"/><text x="735" y="140" class="label">Python AI 服务</text>
  <rect class="box ai" x="750" y="175" width="180" height="65"/><text x="798" y="214" class="h">LangGraph</text>
  <rect class="box ai" x="750" y="270" width="180" height="65"/><text x="803" y="309" class="h">Agent Tools</text>
  <rect class="box ai" x="750" y="365" width="180" height="65"/><text x="805" y="404" class="h">RAG / 记忆</text>

  <rect class="store" x="1030" y="185" width="130" height="80"/><text x="1052" y="220" class="h">PostgreSQL</text><text x="1063" y="247" class="t">主数据</text>
  <rect class="store" x="1030" y="330" width="130" height="80"/><text x="1072" y="365" class="h">Redis</text><text x="1058" y="392" class="t">缓存会话</text>

  <path class="read" d="M250 258H405"/><path class="read" d="M585 398H750"/><path class="write" d="M930 302C980 300 980 225 1030 225"/><path class="read" d="M930 302C990 285 980 225 1030 225"/><path class="read" d="M930 398C990 390 980 370 1030 370"/><path class="write" d="M585 302C670 545 970 545 1095 410"/>
  <text x="666" y="531" class="label">橙色：业务一致性写入必须经平台</text>
  <text x="666" y="557" class="label">蓝色：查询/低延迟读取路径</text>
</svg>

