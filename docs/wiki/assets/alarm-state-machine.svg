<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">告警状态机</title>
  <desc id="desc">告警从 OPEN 到 ACK 到 CLOSED，也支持 OPEN 直接 CLOSED，已关闭告警不能重新打开。</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto"><path d="M0 0L10 5L0 10z" fill="#2563eb"/></marker>
    <marker id="stop" viewBox="0 0 10 10" refX="5" refY="5" markerWidth="8" markerHeight="8"><path d="M1 1L9 9M9 1L1 9" stroke="#dc2626" stroke-width="2"/></marker>
    <style>
      .bg{fill:#f8fafc}.title{font:700 28px sans-serif;fill:#0f172a}.state{fill:#fff;stroke:#2563eb;stroke-width:3;rx:12}
      .open{stroke:#d97706}.ack{stroke:#2563eb}.closed{stroke:#16a34a}.edge{stroke:#2563eb;stroke-width:2.7;fill:none;marker-end:url(#arrow)}
      .bad{stroke:#dc2626;stroke-width:2.6;fill:none;stroke-dasharray:8 7;marker-end:url(#stop)}.h{font:700 24px sans-serif;fill:#0f172a}.t{font:15px sans-serif;fill:#475569}.lab{font:700 15px sans-serif;fill:#334155}
    </style>
  </defs>
  <rect class="bg" width="1200" height="675"/><text x="60" y="58" class="title">告警状态机</text>
  <rect class="state open" x="130" y="245" width="220" height="120"/><text x="205" y="296" class="h">OPEN</text><text x="185" y="328" class="t">待处置告警</text>
  <rect class="state ack" x="490" y="245" width="220" height="120"/><text x="560" y="296" class="h">ACK</text><text x="548" y="328" class="t">已确认</text>
  <rect class="state closed" x="850" y="245" width="220" height="120"/><text x="913" y="296" class="h">CLOSED</text><text x="922" y="328" class="t">已关闭</text>
  <path class="edge" d="M350 305H490"/><text x="393" y="285" class="lab">acknowledge</text>
  <path class="edge" d="M710 305H850"/><text x="765" y="285" class="lab">close</text>
  <path class="edge" d="M240 365C300 490 895 490 960 365"/><text x="535" y="515" class="lab">OPEN 可直接 close</text>
  <path class="bad" d="M850 245C705 110 490 110 350 245"/><text x="522" y="130" class="lab">禁止重新打开已关闭告警</text>
</svg>

