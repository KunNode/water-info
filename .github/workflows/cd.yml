# CD Pipeline - Build and Push Docker images

name: CD

on:
  push:
    branches: [main]
  release:
    types: [published]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  JAVA_VERSION: '17'
  PYTHON_VERSION: '3.11'

jobs:
  # ─── Build and Push Docker Images ───
  build-and-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-platform
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ai
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=
            type=raw,value=latest,enable={{is_default_branch}}

      # ─── Backend Docker Image ───
      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./water-info-platform
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-platform:${{ github.sha }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-platform:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ─── AI Service Docker Image ───
      - name: Build and push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./water-info-ai
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ai:${{ github.sha }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Update Docker Compose ───
  update-compose:
    name: Update Docker Compose
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Update docker-compose.yml with new images
        run: |
          sed -i 's|image: .*/water-info-platform:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-platform:${{ github.sha }}|' docker-compose.yml
          sed -i 's|image: .*/water-info-ai:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-ai:${{ github.sha }}|' docker-compose.yml

      - name: Commit and push docker-compose.yml
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Update Docker images to ${{ github.sha }}"
          file_pattern: docker-compose.yml

  # ─── Build and Push (on release) ───
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event_name == 'release' && github.event.action == 'published'

    steps:
      - name: Create Release Note
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: false
