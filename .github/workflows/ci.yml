# CI Pipeline - Build, Test, and Lint

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  JAVA_VERSION: '17'
  PYTHON_VERSION: '3.11'

jobs:
  # ─── Backend CI ───
  backend-ci:
    name: Backend CI (Spring Boot)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Backend: Build with Maven
        working-directory: water-info-platform
        run: ./mvnw clean compile -B

      - name: Backend: Run tests
        working-directory: water-info-platform
        run: ./mvnw test -B
        env:
          SPRING_PROFILES_ACTIVE: test

      - name: Backend: Run verification
        working-directory: water-info-platform
        run: ./mvnw verify -B -DskipTests

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: water-info-platform/target/surefire-reports/
          retention-days: 7

  # ─── AI Service CI ───
  ai-ci:
    name: AI Service CI (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: water-info-ai/pyproject.toml

      - name: Install uv
        run: pip install uv

      - name: AI Service: Install dependencies
        working-directory: water-info-ai
        run: uv pip install --system -r pyproject.toml

      - name: AI Service: Lint with Ruff
        working-directory: water-info-ai
        run: |
          uv pip install --system ruff
          ruff check app/ tests/

      - name: AI Service: Type check with mypy
        working-directory: water-info-ai
        run: |
          uv pip install --system mypy
          mypy app/ --ignore-missing-imports

      - name: AI Service: Run tests
        working-directory: water-info-ai
        run: |
          uv pip install --system pytest pytest-asyncio pytest-cov
          pytest tests/ -v --cov=app --cov-report=xml --cov-report=term

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-test-reports
          path: water-info-ai/coverage.xml
          retention-days: 7

  # ─── Docker Build Test ───
  docker-build-test:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: [backend-ci, ai-ci]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Docker image
        working-directory: water-info-platform
        run: docker build -t water-info-platform:test .

      - name: Build AI Service Docker image
        working-directory: water-info-ai
        run: docker build -t water-info-ai:test .

  # ─── Security Scan ───
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
